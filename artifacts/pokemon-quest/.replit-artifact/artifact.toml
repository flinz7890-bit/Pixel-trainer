kind = "web"
previewPath = "/"
title = "Pokémon Quest"
version = "1.0.0"
id = "artifacts/pokemon-quest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23101

[services.development]
run = "pnpm --filter @workspace/pokemon-quest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pokemon-quest", "run", "build" ]
publicDir = "artifacts/pokemon-quest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23101"
BASE_PATH = "/"
